name: CI
on: [push]

jobs:
  test_debug_with_static_analysis:
    runs-on: ubuntu-latest
    container: ghcr.io/opencyphal/toolshed:ts24.4.3
    strategy:
      matrix:
        toolchain: ["clang", "gcc"]
        include:
          - toolchain: gcc
            c-compiler: gcc
            cxx-compiler: g++
          - toolchain: clang
            c-compiler: clang
            cxx-compiler: clang++
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - run: |
          apt-get update -y
          apt-get install -y cppcheck
          cppcheck --version
      # language=bash
      - run: >
          cmake
          -S .
          -B $GITHUB_WORKSPACE/build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=${{ matrix.c-compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx-compiler }}
      - run: cd $GITHUB_WORKSPACE/build && make -j"$(nproc)"
      - run: cd $GITHUB_WORKSPACE/build && make test

  test_release:
    runs-on: ubuntu-latest
    container: ghcr.io/opencyphal/toolshed:ts24.4.3
    strategy:
      matrix:
        toolchain: ["clang", "gcc"]
        include:
          - toolchain: gcc
            c-compiler: gcc
            cxx-compiler: g++
          - toolchain: clang
            c-compiler: clang
            cxx-compiler: clang++
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      # language=bash
      - run: >
          cmake
          -S .
          -B $GITHUB_WORKSPACE/build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=${{ matrix.c-compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx-compiler }}
          -DNO_STATIC_ANALYSIS=ON
      - run: cd $GITHUB_WORKSPACE/build && make -j"$(nproc)"
      - run: cd $GITHUB_WORKSPACE/build && make test

  test_coverage:
    runs-on: ubuntu-latest
    container: ghcr.io/opencyphal/toolshed:ts24.4.3
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - run: pip install --break-system-packages gcovr
      # language=bash
      - run: >
          cmake
          -S .
          -B $GITHUB_WORKSPACE/build
          -DCMAKE_BUILD_TYPE=Debug
          -DCOVERAGE=ON
          -DNO_STATIC_ANALYSIS=ON
      - run: cd $GITHUB_WORKSPACE/build && make -j"$(nproc)"
      - run: cd $GITHUB_WORKSPACE/build && make test
      - run: cd $GITHUB_WORKSPACE/build && make coverage
      # Export Cobertura report for Codecov, tracking only cy/cy.c.
      - run: |
          cd "$GITHUB_WORKSPACE/build"
          gcovr \
            --root "$GITHUB_WORKSPACE" \
            --filter '.*/cy/cy\.c$' \
            --xml-pretty \
            --output "$GITHUB_WORKSPACE/build/coverage/cy.cobertura.xml" \
            --print-summary
      - uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: build/coverage/cy.cobertura.xml
          fail_ci_if_error: false
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage/

  arm:
    runs-on: ubuntu-latest
    env:
      flags: -Wall -Wextra -pedantic -Wconversion -Wtype-limits -Wfatal-errors
    strategy:
      matrix:
        std: ["c11"]
    steps:
      - uses: actions/checkout@v4
      # language=bash
      - run: |
          sudo apt update -y
          sudo apt-get install -y gcc-arm-none-eabi
      - run: arm-none-eabi-gcc -Icy -Ilib cy/cy.c -c -std=${{ matrix.std }} ${{ env.flags }}
