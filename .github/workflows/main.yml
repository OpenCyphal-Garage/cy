name: CI
on: [push]

jobs:
  test_debug_with_static_analysis:
    runs-on: ubuntu-latest
    container: ghcr.io/opencyphal/toolshed:ts24.4.3
    strategy:
      matrix:
        toolchain: ["clang", "gcc"]
        include:
          - toolchain: gcc
            c-compiler: gcc
            cxx-compiler: g++
          - toolchain: clang
            c-compiler: clang
            cxx-compiler: clang++
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - run: |
          apt-get update -y
          apt-get install -y cppcheck
          cppcheck --version
      # language=bash
      - run: >
          cmake
          -S .
          -B $GITHUB_WORKSPACE/build
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_COMPILER=${{ matrix.c-compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx-compiler }}
      - run: cd $GITHUB_WORKSPACE/build && make -j"$(nproc)"
      - run: cd $GITHUB_WORKSPACE/build && make test

  test_release:
    runs-on: ubuntu-latest
    container: ghcr.io/opencyphal/toolshed:ts24.4.3
    strategy:
      matrix:
        toolchain: ["clang", "gcc"]
        include:
          - toolchain: gcc
            c-compiler: gcc
            cxx-compiler: g++
          - toolchain: clang
            c-compiler: clang
            cxx-compiler: clang++
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      # language=bash
      - run: >
          cmake
          -S .
          -B $GITHUB_WORKSPACE/build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_C_COMPILER=${{ matrix.c-compiler }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cxx-compiler }}
          -DNO_STATIC_ANALYSIS=ON
      - run: cd $GITHUB_WORKSPACE/build && make -j"$(nproc)"
      - run: cd $GITHUB_WORKSPACE/build && make test

  test_coverage:
    runs-on: ubuntu-latest
    container: ghcr.io/opencyphal/toolshed:ts24.4.3
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - run: pip install --break-system-packages gcovr==7.2
      # language=bash
      - run: >
          cmake
          -S .
          -B $GITHUB_WORKSPACE/build
          -DCMAKE_BUILD_TYPE=Debug
          -DCOVERAGE=ON
          -DNO_STATIC_ANALYSIS=ON
      - run: cd $GITHUB_WORKSPACE/build && make -j"$(nproc)"
      - run: cd $GITHUB_WORKSPACE/build && make test
      - run: cd $GITHUB_WORKSPACE/build && make coverage
      # Export Cobertura report for Coveralls, tracking only cy/cy.c.
      - run: |
          gcovr \
            --root . \
            --object-directory build \
            --filter '^cy/cy[.]c$' \
            --xml-pretty \
            --output build/coverage/cy.cobertura.xml \
            --print-summary
      - id: coveralls_upload
        continue-on-error: true
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_GIT_BRANCH: ${{ github.ref_name }}
          COVERALLS_GIT_COMMIT: ${{ github.sha }}
          COVERALLS_SERVICE_NAME: github
          COVERALLS_SERVICE_JOB_ID: ${{ github.run_id }}
          COVERALLS_SERVICE_BRANCH: ${{ github.ref_name }}
          COVERALLS_SERVICE_BUILD_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p "$HOME/bin"
          curl -fsSLo "$HOME/bin/coveralls-linux-x86_64.tar.gz" \
            https://github.com/coverallsapp/coverage-reporter/releases/latest/download/coveralls-linux-x86_64.tar.gz
          tar -xzf "$HOME/bin/coveralls-linux-x86_64.tar.gz" -C "$HOME/bin"
          "$HOME/bin/coveralls" report \
            --base-path "$GITHUB_WORKSPACE" \
            --format cobertura \
            build/coverage/cy.cobertura.xml
      - if: ${{ steps.coveralls_upload.outcome == 'failure' }}
        run: |
          echo "::warning::Coveralls upload failed (likely Coveralls API issue). Continuing without failing CI."
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/coverage/

  arm:
    runs-on: ubuntu-latest
    env:
      flags: -Wall -Wextra -pedantic -Wconversion -Wtype-limits -Wfatal-errors
    strategy:
      matrix:
        std: ["c11"]
    steps:
      - uses: actions/checkout@v4
      # language=bash
      - run: |
          sudo apt update -y
          sudo apt-get install -y gcc-arm-none-eabi
      - run: arm-none-eabi-gcc -Icy -Ilib cy/cy.c -c -std=${{ matrix.std }} ${{ env.flags }}
